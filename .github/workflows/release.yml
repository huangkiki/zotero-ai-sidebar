name: Release XPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark GitHub Release as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "Release tag must start with v, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac

      - name: Create tag for manual release
        if: github.event_name == 'workflow_dispatch'
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag $RELEASE_TAG already exists on origin"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
            git push origin "refs/tags/$RELEASE_TAG"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]; then
            echo "Tag $RELEASE_TAG does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build XPI
        run: npm run build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: zotero-ai-sidebar-${{ env.RELEASE_TAG }}
          path: |
            .scaffold/build/*.xpi
            .scaffold/build/update*.json
          if-no-files-found: error

      - name: Publish version release
        env:
          GH_TOKEN: ${{ github.token }}
          IS_PRERELEASE: ${{ github.event.inputs.prerelease || 'false' }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" .scaffold/build/*.xpi .scaffold/build/update*.json --clobber
          else
            args=(
              release create "$RELEASE_TAG"
              .scaffold/build/*.xpi
              .scaffold/build/update*.json
              --title "Zotero AI Sidebar $RELEASE_TAG"
              --generate-notes
            )
            if [ "$IS_PRERELEASE" = "true" ]; then
              args+=(--prerelease)
            fi
            gh "${args[@]}"
          fi

      - name: Publish rolling update manifests
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! git ls-remote --exit-code --tags origin refs/tags/release >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a release -m "Rolling Zotero update manifests"
            git push origin refs/tags/release
          fi

          if gh release view release >/dev/null 2>&1; then
            gh release upload release .scaffold/build/update*.json --clobber
          else
            gh release create release .scaffold/build/update*.json \
              --title "Zotero AI Sidebar update manifests" \
              --notes "Rolling update manifests used by Zotero automatic updates." \
              --latest=false
          fi
